<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Atlas</title>

<link rel="stylesheet" href="css/atlas.css">

</head>

<body>

<header class="topbar">

    <div class="topbar-left">
        <a href="index.html" class="backButton">← Dashboard</a>
    </div>

    <div class="topbar-center">
        <h1>Project Atlas</h1>
    </div>

    <div class="topbar-right">
        <span id="atlasVersion">v1.0</span>
    </div>

</header>


<main class="atlasLayout">

    <!-- ================= MAP ================= -->

    <section class="mapPanel">

        <div class="panelTitle">
            State Map
        </div>

        <div id="mapContainer">

            <div id="svgHolder"></div>

            <div id="labelLayer"></div>

        </div>

    </section>


    <!-- ================ RIGHT PANEL ================= -->

    <aside class="sidePanel">

        <!-- Governor -->

<section class="card">

    <div class="cardTitle">
        Governor
    </div>

    <div id="governorBanner">

        <div class="govHeader">

            <div class="govCrown">👑</div>

            <div class="govInfo">

                <div id="govAlliance">
                    —
                </div>

                <div id="govLeader">
                    —
                </div>

            </div>

        </div>

    </div>

</section>


<!-- Territory -->

<section class="card">

    <div class="cardTitle">
        Territory Details
    </div>

    <table class="infoTable">

        <tr>
            <td>ID</td>
            <td id="territoryID">—</td>
        </tr>

        <tr>
            <td>Type</td>
            <td id="territoryType">—</td>
        </tr>

        <tr>
            <td>Level</td>
            <td id="territoryLevel">—</td>
        </tr>

        <tr>
            <td>Owner</td>
            <td id="territoryOwner">—</td>
        </tr>

        <tr>
            <td>Status</td>
            <td id="territoryStatus">—</td>
        </tr>

        <tr>
            <td>Buff</td>
            <td id="territoryBuff">—</td>
        </tr>

        <tr>
            <td>DNA / hr</td>
            <td id="territoryDNA">—</td>
        </tr>

        <tr>
            <td>Contest</td>
            <td id="territoryPoints">—</td>
        </tr>

    </table>

</section>


        <!-- Alliance Summary -->

        <section class="card">

            <div class="cardTitle">

                Alliance Summary

            </div>

            <table class="infoTable">

                <tr>

                    <td>Alliance</td>

                    <td id="sumAlliance">—</td>

                </tr>

                <tr>

                    <td>Tiles</td>

                    <td id="sumTiles">—</td>

                </tr>

                <tr>

                    <td>Buffs</td>

                    <td id="sumBuffs">—</td>

                </tr>

                <tr>

                    <td>DNA/hr</td>

                    <td id="sumDNA">—</td>

                </tr>

                <tr>

                    <td>Points</td>

                    <td id="sumPoints">—</td>

                </tr>

            </table>

        </section>


        <!-- Future Card -->

        <section class="card">

            <div class="cardTitle">

                Selected Alliance

            </div>

            <div id="futureArea">

                (Coming Soon)

            </div>

        </section>

    </aside>

</main>

<script src="core/atlas.js"></script>

</body>

</html>
